<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynamoDB Diagnostic - Phase 1A</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .status-banner {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .status-banner.healthy {
            border-left: 5px solid #10b981;
        }
        
        .status-banner.unhealthy {
            border-left: 5px solid #ef4444;
        }
        
        .status-icon {
            font-size: 48px;
        }
        
        .status-text h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .status-text p {
            color: #666;
            font-size: 14px;
        }
        
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .table-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .table-card.healthy {
            border-left: 5px solid #10b981;
        }
        
        .table-card.unhealthy {
            border-left: 5px solid #ef4444;
        }
        
        .table-card h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .badge.warning {
            background: #fef3c7;
            color: #92400e;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-row .label {
            color: #666;
            font-weight: 500;
        }
        
        .detail-row .value {
            color: #333;
            font-weight: 600;
        }
        
        .check-icon {
            color: #10b981;
            font-size: 20px;
        }
        
        .cross-icon {
            color: #ef4444;
            font-size: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }
        
        .actions {
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 DynamoDB Diagnostic</h1>
            <p>Phase 1A Campaign Executor - Table Schema Validation</p>
        </div>
        
        <div id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Checking DynamoDB tables...</p>
            </div>
        </div>
        
        <div class="actions">
            <button class="refresh-btn" onclick="loadDiagnostic()">🔄 Refresh Diagnostic</button>
        </div>
    </div>

    <script>
        async function loadDiagnostic() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Checking DynamoDB tables...</p>
                </div>
            `;

            try {
                const response = await fetch('/api/campaigns/diagnostic');
                const data = await response.json();

                let html = '';

                // Status banner
                const isHealthy = data.allHealthy;
                html += `
                    <div class="status-banner ${isHealthy ? 'healthy' : 'unhealthy'}">
                        <div class="status-icon">${isHealthy ? '✅' : '❌'}</div>
                        <div class="status-text">
                            <h2>${isHealthy ? 'All Tables Ready' : 'Issues Detected'}</h2>
                            <p>Region: ${data.region} | Checked at: ${new Date(data.timestamp).toLocaleString()}</p>
                        </div>
                    </div>
                `;

                // Tables grid
                html += '<div class="tables-grid">';
                
                data.tables.forEach(table => {
                    const isTableHealthy = table.exists && table.pkMatches && (table.skMatches !== false);
                    
                    html += `
                        <div class="table-card ${isTableHealthy ? 'healthy' : 'unhealthy'}">
                            <h3>
                                ${table.name}
                                ${isTableHealthy ? '<span class="badge success">✓ Healthy</span>' : '<span class="badge error">⚠ Issue</span>'}
                            </h3>
                            
                            <div class="detail-row">
                                <span class="label">Exists:</span>
                                <span class="value">${table.exists ? '<span class="check-icon">✓</span>' : '<span class="cross-icon">✗</span>'}</span>
                            </div>
                            
                            ${table.exists ? `
                                <div class="detail-row">
                                    <span class="label">Status:</span>
                                    <span class="value">${table.status}</span>
                                </div>
                                
                                <div class="detail-row">
                                    <span class="label">Items:</span>
                                    <span class="value">${table.itemCount || 0}</span>
                                </div>
                                
                                <div class="detail-row">
                                    <span class="label">Partition Key:</span>
                                    <span class="value">${table.actualPK || 'N/A'} ${table.pkMatches ? '<span class="check-icon">✓</span>' : '<span class="cross-icon">✗</span>'}</span>
                                </div>
                                
                                ${table.actualSK !== undefined ? `
                                    <div class="detail-row">
                                        <span class="label">Sort Key:</span>
                                        <span class="value">${table.actualSK || 'None'} ${table.skMatches ? '<span class="check-icon">✓</span>' : '<span class="cross-icon">✗</span>'}</span>
                                    </div>
                                ` : ''}
                            ` : ''}
                            
                            ${table.error ? `
                                <div class="error-message">
                                    <strong>Error:</strong> ${table.error}
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                html += '</div>';

                content.innerHTML = html;

            } catch (error) {
                content.innerHTML = `
                    <div class="status-banner unhealthy">
                        <div class="status-icon">❌</div>
                        <div class="status-text">
                            <h2>Diagnostic Failed</h2>
                            <p>${error.message}</p>
                        </div>
                    </div>
                `;
            }
        }

        // Load on page load
        loadDiagnostic();
    </script>
</body>
</html>
